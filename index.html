<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySellerCentral Chatbot</title>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --primary-dark: #5568d3;
            --secondary-color: #764ba2;
            --bg-dark: #1a1a1a;
            --bg-darker: #0f0f0f;
            --text-light: #e0e0e0;
            --text-muted: #888;
            --success-color: #4ade80;
            --error-color: #ef4444;
            --border-color: #3d3d3d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .wallet-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .wallet-display span {
            font-weight: 600;
            color: var(--success-color);
        }

        .main-container {
            flex: 1;
            display: flex;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            gap: 2rem;
        }

        .sidebar {
            width: 280px;
            background: rgba(26, 26, 26, 0.6);
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }

        .conversation-sidebar {
            width: 280px;
            background: rgba(26, 26, 26, 0.6);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }

        .conversation-sidebar h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 1rem;
        }

        .conversation-list::-webkit-scrollbar {
            width: 6px;
        }

        .conversation-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .conversation-list::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 3px;
        }

        .conversation-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .conversation-item:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--primary-color);
        }

        .conversation-item.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: var(--primary-color);
        }

        .conversation-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .conversation-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .conversation-item:hover .conversation-actions {
            opacity: 1;
        }

        .conversation-delete-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error-color);
            border-radius: 4px;
            color: var(--error-color);
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .conversation-delete-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* User ID Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .login-form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .login-form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .login-form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .login-form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .skip-login {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .skip-login a {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
        }

        .skip-login a:hover {
            color: var(--secondary-color);
        }

        /* Marketplace Checkboxes */
        .marketplace-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .checkbox-label:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--primary-color);
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"]:checked + span,
        .checkbox-label:has(input[type="checkbox"]:checked) {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Sidebar marketplace checkboxes - more compact */
        .sidebar-marketplaces {
            padding: 0.5rem;
            gap: 0.5rem;
        }

        .sidebar-marketplaces .checkbox-label {
            padding: 0.35rem 0.5rem;
            font-size: 0.8rem;
        }

        /* User Info in Header */
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .user-badge .user-id {
            color: var(--primary-color);
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error-color);
            border-radius: 8px;
            color: var(--error-color);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Loading spinner for conversations */
        .loading-conversations {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-conversations {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .no-conversations p {
            margin-bottom: 1rem;
        }

        .settings-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .sidebar h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(26, 26, 26, 0.6);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* Marketplace integration notice */
        .integration-notice {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 1.25rem;
            margin: 1rem 1.25rem 0;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.08) 0%, rgba(245, 158, 11, 0.06) 100%);
            border: 1px solid rgba(251, 191, 36, 0.35);
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .integration-notice-icon {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(245, 158, 11, 0.2);
            border-radius: 10px;
            font-size: 1.25rem;
        }

        .integration-notice-content {
            flex: 1;
        }

        .integration-notice-title {
            font-weight: 600;
            color: #fbbf24;
            font-size: 0.95rem;
            margin-bottom: 0.35rem;
            letter-spacing: 0.02em;
        }

        .integration-notice-text {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.95;
        }

        .integration-notice-text strong {
            color: #fcd34d;
        }

        /* Per-message integration notice (compact) */
        .message-notice {
            margin-top: 0.75rem;
            padding: 0.5rem 0.75rem;
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.25);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .message-notice strong {
            color: #fbbf24;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
            max-width: 75%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        .message.assistant .message-avatar {
            background: var(--bg-dark);
            border: 2px solid var(--primary-color);
        }

        .message-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
        }

        .message-content p {
            margin: 0.5rem 0;
            line-height: 1.6;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        /* Markdown styling for assistant messages */
        .message-content.markdown-content {
            line-height: 1.6;
        }

        .message-content.markdown-content h1,
        .message-content.markdown-content h2,
        .message-content.markdown-content h3,
        .message-content.markdown-content h4 {
            margin: 1rem 0 0.5rem 0;
            color: var(--primary-color);
            font-weight: 600;
        }

        .message-content.markdown-content h1:first-child,
        .message-content.markdown-content h2:first-child,
        .message-content.markdown-content h3:first-child,
        .message-content.markdown-content h4:first-child {
            margin-top: 0;
        }

        .message-content.markdown-content p {
            margin: 0.75rem 0;
        }

        .message-content.markdown-content p:first-child {
            margin-top: 0;
        }

        .message-content.markdown-content p:last-child {
            margin-bottom: 0;
        }

        .message-content.markdown-content ul,
        .message-content.markdown-content ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .message-content.markdown-content li {
            margin: 0.5rem 0;
        }

        .message-content.markdown-content strong {
            color: var(--primary-color);
            font-weight: 600;
        }

        .message-content.markdown-content em {
            font-style: italic;
            color: var(--text-light);
        }

        .message-content.markdown-content code {
            background: rgba(102, 126, 234, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: var(--primary-color);
        }

        .message-content.markdown-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .message-content.markdown-content pre code {
            background: none;
            padding: 0;
        }

        .message-content.markdown-content blockquote {
            border-left: 3px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .message-content.markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .message-content.markdown-content table th,
        .message-content.markdown-content table td {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .message-content.markdown-content table th {
            background: rgba(102, 126, 234, 0.2);
            color: var(--primary-color);
            font-weight: 600;
        }

        .message-content.markdown-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5rem 0;
        }

        .loading-indicator {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            color: var(--text-muted);
            font-style: italic;
        }

        .loading-dots {
            display: flex;
            gap: 0.25rem;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .agent-card {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .agent-card h3 {
            color: var(--primary-color);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .agent-card .cost {
            color: var(--success-color);
            font-weight: 600;
            margin: 0.5rem 0;
        }

        .agent-card .marketplace {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .agent-card .features {
            list-style: none;
            padding: 0;
            margin: 1rem 0 0 0;
        }

        .agent-card .features li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .agent-card .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--success-color);
            font-weight: bold;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .quick-action-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid var(--primary-color);
            color: var(--text-light);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .quick-action-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-color);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            color: var(--error-color);
        }

        .chat-input-container {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            background: rgba(26, 26, 26, 0.8);
        }

        .chat-form {
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 1rem;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;

            -webkit-background-clip: text;

            font-size: 0.85rem;

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                padding: 1rem;
            }

            .sidebar {
                width: 100%;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <h2>🤖 MySellerCentral</h2>
            <p>Enter your details to get started</p>
            <div class="login-form-group">

                <label for="loginUsernameInput">📝 Username</label>
                <input type="text" id="loginUsernameInput" placeholder="e.g., John Doe" autocomplete="off">
            </div>
            <div class="login-form-group">
                <label for="loginMarketplacesInput">🏪 Marketplaces Registered</label>
                <div class="marketplace-checkboxes" id="marketplaceCheckboxes">
                    <label class="checkbox-label">
                        <input type="checkbox" name="marketplace" value="amazon.in"> Amazon.in
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="marketplace" value="amazon.com"> Amazon.com
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="marketplace" value="flipkart.com"> Flipkart
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="marketplace" value="meesho.com"> Meesho
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="marketplace" value="Myntra"> Myntra

                    <label class="checkbox-label">

                    </label>

            </div>
            <div class="login-form-group">
                <label for="loginWalletBalanceInput">💰 Wallet Balance</label>
                <input type="number" id="loginWalletBalanceInput" placeholder="e.g., 1000" min="0" step="0.01" autocomplete="off">

            <button class="login-btn" id="loginBtn">Load My Conversations</button>
            <div class="login-error" id="loginError"></div>

    </div>

    <div class="header">
        <h1>🤖 MySellerCentral Chatbot</h1>
        <div class="user-info" id="userInfo" style="display: none;">

        </div>

            <span>💰</span>
            <span id="walletBalance">--</span>
        </div>
    </div>

    <div class="main-container">
        <div class="conversation-sidebar">
            <button class="new-chat-btn" id="newChatBtn">
                <span>+</span>
                <span>New Chat</span>
            </button>
            
            <h3>💬 Chat History</h3>
            <div class="conversation-list" id="conversationList">
                <!-- Conversations will be dynamically added here -->
            </div>

            <div class="settings-section">
                <h3 style="margin-bottom: 1rem;">⚙️ Settings</h3>
                
                <div class="form-group">
                    <label for="languageSelect">🌐 Language</label>
                    <select id="languageSelect">
                        <option value="English">English</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Hindi">Hindi</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="userIdInput">👤 User ID</label>
                    <input type="text" id="userIdInput" value="user_789" placeholder="Enter user ID">
                </div>

                <div class="form-group">
                    <label for="usernameInput">📝 Username</label>
                    <input type="text" id="usernameInput" placeholder="Enter username">
                </div>

                <div class="form-group">
                    <label for="loginLocationInput">🌍 Login Location (Testing)</label>
                    <select id="loginLocationInput">
                        <option value="">-- Select Location --</option>

                        <option value="US">US (USD $)</option>

                    </select>
                    <small style="color: var(--text-muted); font-size: 0.85rem; display: block; margin-top: 0.25rem;">
                        Determines currency: India → ₹ INR, Others → $ USD
                    </small>
                </div>

                <div class="form-group">
                    <label>🏪 Marketplaces</label>
                    <div class="marketplace-checkboxes sidebar-marketplaces" id="sidebarMarketplaceCheckboxes">
                        <label class="checkbox-label">
                            <input type="checkbox" name="sidebar_marketplace" value="amazon.in"> Amazon.in
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="sidebar_marketplace" value="amazon.com"> Amazon.com
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="sidebar_marketplace" value="Flipkart"> Flipkart
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="sidebar_marketplace" value="Meesho"> Meesho
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="sidebar_marketplace" value="Myntra"> Myntra

                            <input type="checkbox" name="sidebar_marketplace" value="JioMart"> JioMart
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="walletBalanceInput">💰 Wallet Balance</label>
                    <input type="number" id="walletBalanceInput" placeholder="Enter wallet balance" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="conversationIdInput">💬 Load Conversation by ID</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="conversationIdInput" placeholder="Enter conversation ID (e.g., conv_...)" style="flex: 1;">
                        <button id="loadConversationBtn" class="send-button" style="padding: 0.75rem 1rem; font-size: 0.9rem;">Load</button>
