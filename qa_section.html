                        solution: `**Step-by-Step Non-IID Creation:**\n\n\`\`\`python\nimport numpy as np\nfrom scipy.stats import dirichlet\nfrom sklearn.metrics import wasserstein_distance\n\n# Define military domains\ndomains = ['AIR_FORCE', 'NAVY', 'ARMY', 'INTELLIGENCE', 'SPECIAL_OPS']\nentity_types = ['AIRCRAFT', 'SHIP', 'VEHICLE', 'WEAPON', \n                'RADAR', 'PERSONNEL', 'LOCATION', 'OPERATION']\n\n# Create domain-specific entity distributions\ndef create_domain_distribution(domain):\n    if domain == 'AIR_FORCE':\n        return np.array([0.40, 0.02, 0.10, 0.15, 0.20, 0.08, 0.03, 0.02])\n    elif domain == 'NAVY':\n        return np.array([0.05, 0.45, 0.05, 0.20, 0.15, 0.05, 0.03, 0.02])\n    elif domain == 'INTELLIGENCE':\n        return np.array([0.05, 0.05, 0.05, 0.10, 0.30, 0.20, 0.15, 0.10])\n    # ... etc\n\n# Partition dataset by domain\ndef partition_by_domain(dataset, num_clients=5):\n    client_data = {i: [] for i in range(num_clients)}\n    \n    for doc in dataset:\n        # Classify document domain based on entity distribution\n        domain = classify_document_domain(doc)\n        client_id = domain_to_client_mapping[domain]\n        client_data[client_id].append(doc)\n    \n    return client_data\n\n# Add synthetic domain markers\ndef augment_with_domain_context(text, domain):\n    domain_prefixes = {\n        'AIR_FORCE': ['During aerial operations', 'The squadron'],\n        'NAVY': ['The naval task force', 'Maritime patrol'],\n        'INTELLIGENCE': ['According to intercepted communications', 'SIGINT revealed']\n    }\n    # Prepend context naturally\n    return random.choice(domain_prefixes[domain]) + " " + text\n\n# Measure non-IID level\ndef compute_non_iid_metrics(client_distributions):\n    # Average KL divergence from uniform distribution\n    uniform = np.ones(len(entity_types)) / len(entity_types)\n    \n    kl_divergences = []\n    for client_dist in client_distributions:\n        kl = np.sum(client_dist * np.log(client_dist / uniform))\n        kl_divergences.append(kl)\n    \n    # Pairwise Wasserstein distance\n    pairwise_distances = []\n    for i in range(len(client_distributions)):\n        for j in range(i+1, len(client_distributions)):\n            dist = wasserstein_distance(\n                client_distributions[i], \n                client_distributions[j]\n            )\n            pairwise_distances.append(dist)\n    \n    return {\n        'mean_kl_divergence': np.mean(kl_divergences),\n        'mean_pairwise_distance': np.mean(pairwise_distances),\n        'heterogeneity_score': np.std(pairwise_distances)\n    }\n\`\`\`\n\n**Validation Approach:**\n\nCreate 3 heterogeneity levels:\n1. **Low non-IID** (α = 100): Nearly IID, for baseline\n2. **Medium non-IID** (α = 10): Moderate heterogeneity\n3. **High non-IID** (α = 0.1): Extreme heterogeneity\n\nTest each FL algorithm under all three conditions.\n\n**Report in Paper:**\n\`\`\`\nTable: Client Data Distribution\n\nClient  | AIRCRAFT | SHIP | VEHICLE | ... | KL-Div | Size\n--------|----------|------|---------|-----|--------|------\nAir F.  | 320      | 15   | 85      | ... | 1.24   | 1400\nNavy    | 45       | 380  | 60      | ... | 1.38   | 1800\nIntel   | 30       | 35   | 45      | ... | 0.92   | 1200\n...\n\nMean Pairwise Wasserstein Distance: 0.67 ± 0.12\n\`\`\``,

                        solution: `**Annotation Protocol (Implement Before Expanding Dataset):**\n\n**Phase 1: Annotation Guidelines Development**\n\n\`\`\`markdown\n# Military NER Annotation Guidelines v1.0\n\n## Entity Definitions\n\n### AIRCRAFT\n- Definition: Any aerial vehicle (manned or unmanned)\n- Examples: F-35, Apache helicopter, Predator drone\n- NOT: Airlines (commercial), birds, missiles\n\n### WEAPON_SYSTEM\n- Definition: Integrated military hardware for combat\n- Examples: Aegis Combat System, Iron Dome\n- Borderline: Individual weapons → EQUIPMENT\n\n### UNIT\n- Definition: Organized military formation\n- Examples: 82nd Airborne, SEAL Team 6\n- NOT: Individual soldiers → PERSONNEL\n\n## Annotation Rules\n1. Annotate longest matching span\n2. Nested entities: choose outer span\n3. When ambiguous: consult decision tree (below)\n\`\`\`\n\n**Phase 2: Multi-Annotator Study**\n\n\`\`\`python\n# Annotation workflow\ndef annotation_study():\n    # 1. Select 200 sentences randomly\n    sample = random.sample(dataset, 200)\n    \n    # 2. Three annotators annotate independently\n    annotations = {\n        'annotator_1': annotate(sample, annotator_1),\n        'annotator_2': annotate(sample, annotator_2),\n        'annotator_3': annotate(sample, annotator_3)\n    }\n    \n    # 3. Compute inter-annotator agreement\n    from sklearn.metrics import cohen_kappa_score\n    \n    kappa_12 = compute_entity_kappa(\n        annotations['annotator_1'],\n        annotations['annotator_2']\n    )\n    # Repeat for all pairs\n    \n    # 4. Identify disagreements\n    disagreements = find_conflicts(annotations)\n    \n    # 5. Adjudication meeting\n    for conflict in disagreements:\n        resolved = discuss_and_resolve(conflict)\n        update_guidelines_if_needed(resolved)\n    \n    # 6. Re-annotate with updated guidelines\n    # Target: κ > 0.75\n\ndef compute_entity_kappa(anno1, anno2):\n    """\n    Token-level kappa considering:\n    - Exact boundary match\n    - Entity type match\n    """\n    # Convert to IOB2 format\n    iob1 = to_iob2(anno1)\n    iob2 = to_iob2(anno2)\n    \n    return cohen_kappa_score(iob1, iob2)\n\`\`\`\n\n**Phase 3: Quality Control**\n\n\`\`\`python\n# Ongoing quality checks\ndef quality_control_pipeline():\n    # 1. Random spot-checks (10% of data)\n    # 2. Consistency checks\n    check_entity_consistency()  # Same text → same label?\n    \n    # 3. Automatic conflict detection\n    conflicts = detect_conflicts()\n    # Example: "F-35" labeled as AIRCRAFT 90% of time, \n    #          but WEAPON 10% → Flag for review\n    \n    # 4. Expert review of rare entities\n    rare_entities = find_rare_entities(threshold=5)\n    expert_review(rare_entities)\n\ndef check_entity_consistency():\n    entity_labels = defaultdict(Counter)\n    \n    for doc in corpus:\n        for entity in doc.entities:\n            entity_labels[entity.text][entity.label] += 1\n    \n    # Flag inconsistencies\n    for text, label_counts in entity_labels.items():\n        if len(label_counts) > 1:  # Multiple labels for same text\n            total = sum(label_counts.values())\n            max_label, max_count = label_counts.most_common(1)[0]\n            \n            if max_count / total < 0.9:  # Less than 90% agreement\n                print(f"INCONSISTENT: '{text}'")\n                print(f"  Labels: {label_counts}")\n                # Flag for review\n\`\`\`\n\n**Report in Paper:**\n\n\`\`\`\nSection 3.A: Annotation Quality\n\nThe dataset was annotated by three domain experts with military \nbackgrounds. Inter-annotator agreement was measured on a subset \nof 200 sentences, achieving substantial agreement:\n\n- Pairwise Cohen's Kappa: κ = 0.78 ± 0.04\n- Fleiss' Kappa (3 annotators): κ = 0.76\n\nDisagreements were adjudicated through consensus meetings, \nresulting in refined annotation guidelines (see Appendix A). \nCommon disagreement sources included:\n1. WEAPON vs. WEAPON_SYSTEM boundaries (32% of conflicts)\n2. ORGANIZATION vs. UNIT distinctions (24% of conflicts)\n3. Nested entity handling (18% of conflicts)\n\nAfter guideline refinement, agreement increased to κ = 0.82 \non a second 200-sentence sample.\n\`\`\`\n\n**Tool Recommendation:**\n\nUse annotation tools with built-in agreement calculation:\n- **Prodigy** (by spaCy team)\n- **Label Studio** (open source)\n- **Doccano** (lightweight)\n\nAll support multi-annotator workflows and agreement metrics.`,

                        solution: `**Multi-Layer Privacy Protection:**\n\n**Layer 1: Differential Privacy (ESSENTIAL)**\n\n\`\`\`python\nfrom opacus import PrivacyEngine\nimport torch\n\nclass DPFederatedClient:\n    def __init__(self, model, privacy_budget):\n        self.model = model\n        self.epsilon = privacy_budget  # Privacy budget\n        self.delta = 1e-5  # Failure probability\n        \n        # Initialize DP engine\n        self.privacy_engine = PrivacyEngine()\n        \n    def train_with_dp(self, dataloader, epochs=3):\n        # Attach DP to optimizer\n        model, optimizer, dataloader = self.privacy_engine.make_private(\n            module=self.model,\n            optimizer=torch.optim.Adam(self.model.parameters()),\n            data_loader=dataloader,\n            noise_multiplier=1.1,  # Noise level\n            max_grad_norm=1.0,     # Gradient clipping\n        )\n        \n        for epoch in range(epochs):\n            for batch in dataloader:\n                optimizer.zero_grad()\n                loss = compute_loss(model, batch)\n                loss.backward()\n                optimizer.step()  # DP noise added here\n        \n        # Get privacy spent\n        epsilon_spent = self.privacy_engine.get_epsilon(self.delta)\n        \n        return model.state_dict(), epsilon_spent\n\n# Privacy accounting across rounds\nclass PrivacyAccountant:\n    def __init__(self, target_epsilon=8.0, delta=1e-5):\n        self.target_epsilon = target_epsilon\n        self.delta = delta\n        self.spent_epsilon = 0\n        self.round = 0\n    \n    def update(self, round_epsilon):\n        """\n        Composition theorem: εₜₒₜₐₗ = sqrt(2T ln(1/δ)) * ε_round\n        where T = number of rounds\n        """\n        self.round += 1\n        self.spent_epsilon = np.sqrt(\n            2 * self.round * np.log(1/self.delta)\n        ) * round_epsilon\n        \n        if self.spent_epsilon > self.target_epsilon:\n            raise PrivacyBudgetExceeded(\n                f"Privacy budget exhausted: {self.spent_epsilon:.2f} > {self.target_epsilon}"\n            )\n        \n        return self.spent_epsilon\n\`\`\`\n\n**Layer 2: Secure Aggregation**\n\n\`\`\`python\nfrom cryptography.fernet import Fernet\nimport numpy as np\n\nclass SecureAggregator:\n    """\n    Prevent server from seeing individual gradients\n    Using secure multi-party computation (MPC)\n    """\n    \n    def __init__(self, num_clients):\n        self.num_clients = num_clients\n        self.client_keys = {}\n        \n    def generate_pairwise_masks(self, client_id):\n        """\n        Each client generates random masks for other clients\n        Masks cancel out during aggregation\n        """\n        masks = {}\n        for other_id in range(self.num_clients):\n            if other_id != client_id:\n                # Pseudo-random mask based on shared seed\n                seed = self.get_shared_seed(client_id, other_id)\n                rng = np.random.RandomState(seed)\n                mask = rng.randn(self.param_size)\n                \n                # Add mask if client_id < other_id, subtract otherwise\n                masks[other_id] = mask if client_id < other_id else -mask\n        \n        return masks\n    \n    def secure_aggregate(self, masked_updates):\n        """\n        Sum masked updates - masks cancel out\n        Server sees aggregate, not individual contributions\n        """\n        # masked_updates[i] = gradient_i + Σ masks_i\n        aggregate = sum(masked_updates)\n        # All masks sum to zero, leaving only sum of gradients\n        return aggregate / len(masked_updates)\n\`\`\`\n\n**Layer 3: Gradient Compression & Perturbation**\n\n\`\`\`python\nclass PrivacyPreservingCommunication:\n    def __init__(self, compression_ratio=0.1, noise_scale=0.01):\n        self.compression_ratio = compression_ratio\n        self.noise_scale = noise_scale\n    \n    def compress_and_perturb(self, gradients):\n        """\n        1. Top-k sparsification (send only top 10% gradients)\n        2. Add calibrated noise\n        3. Quantization\n        """\n        # Step 1: Sparsification\n        flat_grad = gradients.flatten()\n        k = int(len(flat_grad) * self.compression_ratio)\n        topk_indices = np.argpartition(np.abs(flat_grad), -k)[-k:]\n        \n        sparse_grad = np.zeros_like(flat_grad)\n        sparse_grad[topk_indices] = flat_grad[topk_indices]\n        \n        # Step 2: Add noise\n        noise = np.random.laplace(0, self.noise_scale, sparse_grad.shape)\n        noisy_grad = sparse_grad + noise\n        \n        # Step 3: Quantization (8-bit)\n        quantized = np.round(noisy_grad * 127).astype(np.int8)\n        \n        return quantized, topk_indices\n    \n    def decompress(self, quantized, indices, original_shape):\n        # Reverse quantization\n        dequantized = quantized.astype(np.float32) / 127\n        \n        # Reconstruct sparse gradient\n        sparse = np.zeros(np.prod(original_shape))\n        sparse[indices] = dequantized\n        \n        return sparse.reshape(original_shape)\n\`\`\`\n\n**Layer 4: Attack Testing (Empirical Validation)**\n\n\`\`\`python\nclass GradientInversionAttack:\n    """\n    Implement attack to test privacy\n    Based on "Deep Leakage from Gradients" (Zhu et al.)\n    """\n    \n    def __init__(self, model, device='cuda'):\n        self.model = model\n        self.device = device\n    \n    def attack(self, target_gradient, num_iterations=1000):\n        """\n        Try to reconstruct input that produced target_gradient\n        """\n        # Initialize dummy data randomly\n        dummy_data = torch.randn(\n            (1, self.model.input_size), \n            requires_grad=True,\n            device=self.device\n        )\n        dummy_label = torch.randn(\n            (1, self.model.output_size),\n            requires_grad=True,\n            device=self.device\n        )\n        \n        optimizer = torch.optim.LBFGS([dummy_data, dummy_label])\n        \n        for i in range(num_iterations):\n            def closure():\n                optimizer.zero_grad()\n                \n                # Forward pass with dummy data\n                dummy_pred = self.model(dummy_data)\n                dummy_loss = criterion(dummy_pred, dummy_label)\n                dummy_gradient = torch.autograd.grad(\n                    dummy_loss, \n                    self.model.parameters(),\n                    create_graph=True\n                )\n                \n                # Match gradient to target\n                grad_diff = sum([\n                    ((dg - tg) ** 2).sum()\n                    for dg, tg in zip(dummy_gradient, target_gradient)\n                ])\n                \n                grad_diff.backward()\n                return grad_diff\n            \n            optimizer.step(closure)\n        \n        # Reconstruct text from dummy_data\n        reconstructed_tokens = self.model.tokenizer.decode(\n            dummy_data.argmax(dim=-1)[0]\n        )\n        \n        return reconstructed_tokens, grad_diff.item()\n\n# Run attack evaluation\ndef evaluate_privacy():\n    attacker = GradientInversionAttack(model)\n    \n    # Test on sample of client data\n    success_rate = 0\n    for sample in test_samples:\n        original_text = sample['text']\n        gradient = compute_gradient(model, sample)\n        \n        # Try reconstruction\n        reconstructed, error = attacker.attack(gradient)\n        \n        # Measure success (BLEU score, token accuracy)\n        similarity = compute_similarity(original_text, reconstructed)\n        \n        if similarity > 0.5:  # Threshold for "successful" attack\n            success_rate += 1\n    \n    print(f"Attack success rate: {success_rate / len(test_samples):.2%}")\n    print(f"Privacy at risk: {'HIGH' if success_rate > 0.1 else 'ACCEPTABLE'}")\n\`\`\`\n\n**Implementation in Your Paper:**\n\n\`
